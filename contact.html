<body>
  <p id="warning">Please complete this form:</p>
  <form id="contact-form" action="https://formsubmit.co/mattcodesbusiness@gmail.com" method="post">
        <ul>
          <li>
            <label for="firstname">First Name:</label>
            <input type="text" required id="firstname" name="First_Name" />
          </li>
          <li>
            <label for="lastname">Last Name:</label>
            <input type="text" required id="lastname" name="Last_Name" />
          </li>
          <li>
            <label for="Callback">Phone number:</label>
            <input type="number"  required id="number" name="number" pattern="/^-?\d+\.?\d*$/" onKeyPress="if(this.value.length==15) return false;" />
          </li>
          <li>
            <label for="msg">Message:</label>
            <textarea id="message" required name="message" maxlength="250"></textarea>
          </li>
          <li><input type="hidden" name="_captcha" value="false"></li>
          <li>
            <button id ="submit">Submit</button>
          </li>
        </ul>
      </form>
</body>
