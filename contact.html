<!DOCTYPE html>

           <a href="blog.html">Blog</a>

         </div>
   </div>
</header>
<body>
    <form id="contact-form" action="https://formsubmit.co/checkinsheettest@gmail.com" method="post">
        <ul>
          <li>
            <label for="firstname">First Name:</label>
            <input type="text" required id="firstname" name="First_Name" />
          </li>
          <li>
            <label for="lastname">Last Name:</label>
            <input type="text" required id="lastname" name="Last_Name" />
          </li>
          <li>
            <label for="Work Order">Phone number:</label>
            <input type="number"  required id="work order" name="work order number" pattern="/^-?\d+\.?\d*$/" onKeyPress="if(this.value.length==15) return false;" />
          </li>
    
         
          <li>
            <label for="msg">Comments:</label>
            <textarea id="message" name="message" maxlength="250"></textarea>
          </li>
          <li>
            <button id ="submit">Submit</button>
          </li>
        </ul>
      </form>
</body>
</html>
